name: Scrape Funcionarios (progresivo)

# Barrido PROGRESIVO de TODO el Estado (instituciones, militares, empresas públicas).
# 1) Descarga/actualiza el catálogo de entidades (data/entidades.csv).
# 2) Barre funcionarios por catálogo (resumable vía checkpoint).
# 3) Regenera el JSON del sitio y commitea el avance → se ve crecer en GitHub Pages.

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Año de la foto"
        default: "2026"
      max_minutes:
        description: "Minutos máximos por corrida"
        default: "300"
  schedule:
    - cron: "0 7 * * *" # 02:00 Perú, continúa el barrido a diario

permissions:
  contents: write

concurrency:
  group: scrape-funcionarios
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx tenacity

      - name: Actualizar catálogo de entidades
        run: python scripts/descargar_catalogo.py

      - name: Barrer funcionarios (catálogo completo, resumable)
        run: |
          python scripts/scrape_funcionarios.py \
            --ids-file data/entidades.csv \
            --year "${{ github.event.inputs.year || '2026' }}" \
            --delay 0.35 \
            --max-minutes "${{ github.event.inputs.max_minutes || '300' }}" \
            --resume \
            --out data/funcionarios.csv

      - name: Generar datos del sitio
        run: |
          python scripts/analizar_funcionarios.py --in data/funcionarios.csv || true
          python scripts/build_site_data.py

      - name: Commit avance
        run: |
          git config user.name "peru-transparente-bot"
          git config user.email "unimauro@users.noreply.github.com"
          git add data/ frontend/public/data/
          n=$(($(wc -l < data/funcionarios.csv) - 1))
          git diff --staged --quiet || git commit -m "data: barrido progresivo — ${n} funcionarios $(date -u +%F)"
          git push
