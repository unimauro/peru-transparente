name: Scrape Funcionarios (progresivo)

# Barrido PROGRESIVO de TODO el Estado (instituciones, militares, empresas públicas).
# 1) Descarga/actualiza el catálogo de entidades (data/entidades.csv).
# 2) Barre funcionarios por catálogo (resumable vía checkpoint).
# 3) Regenera el JSON del sitio y commitea el avance → se ve crecer en GitHub Pages.

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Año de la foto"
        default: "2026"
      max_minutes:
        description: "Minutos máximos por corrida"
        default: "300"
  schedule:
    - cron: "0 7 * * *" # 02:00 Perú, continúa el barrido a diario

permissions:
  contents: write

concurrency:
  group: scrape-funcionarios
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx tenacity

      - name: Actualizar catálogo de entidades
        run: python scripts/descargar_catalogo.py

      - name: Barrer y commitear por ciclos (se ve crecer)
        env:
          YEAR: ${{ github.event.inputs.year || '2026' }}
          TOTAL_MIN: ${{ github.event.inputs.max_minutes || '300' }}
          CYCLE_MIN: "15"
        run: |
          git config user.name "peru-transparente-bot"
          git config user.email "unimauro@users.noreply.github.com"
          cycles=$(( TOTAL_MIN / CYCLE_MIN )); [ "$cycles" -lt 1 ] && cycles=1
          for c in $(seq 1 "$cycles"); do
            echo "::group::Ciclo $c/$cycles"
            python scripts/scrape_funcionarios.py \
              --ids-file data/entidades.csv --year "$YEAR" --delay 0.35 \
              --max-minutes "$CYCLE_MIN" --resume --out data/funcionarios.csv
            python scripts/analizar_funcionarios.py --in data/funcionarios.csv || true
            python scripts/build_site_data.py
            git add data/ frontend/public/data/
            n=$(($(wc -l < data/funcionarios.csv) - 1))
            done_n=$(python3 -c "import json;print(len(json.load(open('data/funcionarios.checkpoint.json'))['done']))" 2>/dev/null || echo 0)
            if git diff --staged --quiet; then
              echo "Sin cambios nuevos; barrido completo. Fin."
              echo "::endgroup::"; break
            fi
            git commit -m "data: barrido progresivo — ${n} funcionarios, ${done_n}/2308 entidades $(date -u +%F\ %H:%M)"
            git pull --rebase --autostash -q origin main || true
            git push
            echo "::endgroup::"
          done
