name: Scrape Funcionarios (progresivo)

# Descarga PROGRESIVA de funcionarios del Estado (PTE) → data/funcionarios.csv.
# Resumable: usa data/funcionarios.checkpoint.json para continuar donde quedó.
# Cada corrida tiene tope de tiempo y commitea lo avanzado, así se ve crecer el CSV.

on:
  workflow_dispatch:
    inputs:
      ids:
        description: "Rango de id_entidad a barrer"
        default: "1-700"
      year:
        description: "Año de la foto"
        default: "2026"
      max_minutes:
        description: "Minutos máximos por corrida"
        default: "300"
  schedule:
    - cron: "0 7 * * *" # 02:00 Perú, continúa el barrido a diario

permissions:
  contents: write

concurrency:
  group: scrape-funcionarios
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install httpx tenacity

      - name: Scrape (progresivo, resumable)
        run: |
          python scripts/scrape_funcionarios.py \
            --ids "${{ github.event.inputs.ids || '1-700' }}" \
            --year "${{ github.event.inputs.year || '2026' }}" \
            --delay 0.4 \
            --max-minutes "${{ github.event.inputs.max_minutes || '300' }}" \
            --resume \
            --out data/funcionarios.csv

      - name: Analizar puestos clave
        run: python scripts/analizar_funcionarios.py --in data/funcionarios.csv || true

      - name: Commit avance
        run: |
          git config user.name "peru-transparente-bot"
          git config user.email "unimauro@users.noreply.github.com"
          git add data/funcionarios.csv data/funcionarios.checkpoint.json data/funcionarios_clave.csv
          n=$(($(wc -l < data/funcionarios.csv) - 1))
          git diff --staged --quiet || git commit -m "data(funcionarios): avance progresivo — ${n} filas $(date -u +%F)"
          git push
